<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#3ddc84">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Plan My Day</title>

  <link id="bootstrap-theme-css" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <script>const BUILD_NUMBER = "202607121028";</script>
</head>

<body>

  <!-- FIXED TOOLBAR -->
  <nav id="mainNav" class="navbar navbar-expand px-3 py-2 gap-1 flex-wrap">

    <button class="btn p-1 me-1" onclick="openSettings()" title="Settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
        <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.377l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/>
      </svg>
    </button>

    <div class="dropdown">
      <button class="btn btn-sm dropdown-toggle" data-bs-toggle="dropdown">Edit</button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" onclick="openStreamsEditor()">Links</a></li>
        <li><a class="dropdown-item" onclick="openImagesEditor()">Images</a></li>
      </ul>
    </div>
    <div class="dropdown">
      <button class="btn btn-sm dropdown-toggle" data-bs-toggle="dropdown">Import/Export</button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" onclick="exportData()">Export</a></li>
        <li><a class="dropdown-item" onclick="importData()">Import</a></li>
      </ul>
    </div>

  </nav>

  <!-- MAIN CONTENT -->
  <div class="container-fluid px-3">

    <div id="countdownContainer"></div>

    <!-- THREADS EDITOR -->
    <div id="streamsEditor" class="d-none">
      <div id="streamsEditorHeader">
        <h2 class="mb-3">Links</h2>
        <div id="addStreamTileTop" class="mb-3"></div>
        <div id="streamEditorFilters" class="mb-3"></div>
      </div>
      <div id="streamEditorList"></div>
      <div id="addStreamTile" class="mt-3"></div>
      <div id="singleStreamEditor" class="d-none"></div>
    </div>

    <!-- IMAGES EDITOR -->
    <div id="imagesEditor" class="d-none">
      <div id="imagesEditorHeader">
        <h2 class="mb-3">Edit Images</h2>
        <div id="addImageTileTop" class="mb-3"></div>
        <div id="imageFilters" class="mb-3"></div>
      </div>
      <div id="imagesList"></div>
      <div id="addImageTile" class="mt-3"></div>
      <div id="singleImageEditor" class="d-none"></div>
    </div>

    <!-- IMAGE PICKER MODAL (Bootstrap modal) -->
    <div id="imagePickerModal" class="modal fade" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h3 class="modal-title">Choose Image</h3>
            <button type="button" class="btn-close" onclick="closeImagePicker()"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3 d-flex gap-2">
              <input class="form-control image-picker-search" type="search" placeholder="Search images by name..." oninput="filterImagePicker(this.value)">
              <button class="btn btn-outline-secondary" onclick="clearImagePickerFilter()">Clear</button>
            </div>
            <div class="image-picker-list d-flex flex-wrap" style="gap:8px;min-height:120px"></div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" onclick="selectImagePickerItem(null)">No Image</button>
            <button class="btn btn-outline-secondary" onclick="closeImagePicker()">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- SETTINGS PAGE -->
    <div id="settingsPage" class="d-none">
      <h2 class="mb-3">Settings</h2>

      <div class="d-flex gap-2 mb-3">
        <button class="btn btn-success editor-btn btn-wide ms-auto" onclick="closeSettings()">Done</button>
      </div>

      <div class="row mb-3 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Theme</label></div>
        <div class="col-8">
          <select id="themeSelector" class="form-select" onchange="changeTheme(this.value)">
            <option value="cerulean">Cerulean (light)</option>
            <option value="cosmo">Cosmo (light)</option>
            <option value="cyborg">Cyborg (dark)</option>
            <option value="darkly" selected>Darkly (dark)</option>
            <option value="flatly">Flatly (light)</option>
            <option value="journal">Journal (light)</option>
            <option value="litera">Litera (light)</option>
            <option value="lumen">Lumen (light)</option>
            <option value="lux">Lux (light)</option>
            <option value="materia">Materia (light)</option>
            <option value="minty">Minty (light)</option>
            <option value="morph">Morph (light)</option>
            <option value="pulse">Pulse (light)</option>
            <option value="quartz">Quartz (light)</option>
            <option value="sandstone">Sandstone (light)</option>
            <option value="simplex">Simplex (light)</option>
            <option value="sketchy">Sketchy (light)</option>
            <option value="slate">Slate (dark)</option>
            <option value="solar">Solar (dark)</option>
            <option value="spacelab">Spacelab (light)</option>
            <option value="superhero">Superhero (dark)</option>
            <option value="united">United (light)</option>
            <option value="vapor">Vapor (dark)</option>
            <option value="yeti">Yeti (light)</option>
            <option value="zephyr">Zephyr (light)</option>
          </select>
        </div>
      </div>

      <div class="row mb-4 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Font size</label></div>
        <div class="col-8">
          <select id="fontSizeSelector" class="form-select" onchange="changeFontSize(this.value)">
            <option value="xsmall">Extra small</option>
            <option value="small">Small</option>
            <option value="normal">Normal</option>
            <option value="large">Large</option>
            <option value="xlarge">Extra large</option>
            <option value="jumbo">Jumbo</option>
          </select>
        </div>
      </div>

      <div class="row mb-4 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Icon size</label></div>
        <div class="col-8">
          <select id="iconSizeSelector" class="form-select" onchange="changeIconSize(this.value)">
            <option value="small">Small (64x64)</option>
            <option value="medium">Medium (80x80)</option>
            <option value="large">Large (100x100)</option>
          </select>
        </div>
      </div>

      <div class="row mb-4 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Tile density</label></div>
        <div class="col-8">
          <select id="densitySelector" class="form-select" onchange="changeDensity(this.value)">
            <option value="normal">Normal</option>
            <option value="compact">Compact</option>
          </select>
        </div>
      </div>

      <div class="row mb-4 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Auto-hide menu</label></div>
        <div class="col-8">
          <div class="form-check form-switch mt-1">
            <input id="autoHideMenu" class="form-check-input" type="checkbox" onchange="changeAutoHideMenu(this.checked)">
          </div>
        </div>
      </div>

      <div class="row mb-4 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Show danger</label></div>
        <div class="col-8">
          <div class="form-check form-switch mt-1">
            <input id="showDanger" class="form-check-input" type="checkbox" onchange="changeShowDanger(this.checked)">
          </div>
        </div>
      </div>

      <div id="clearAllDataRow" class="mt-4 row align-items-center col-md-8 d-none">
        <div class="col-4 text-end"></div>
        <div class="col-8">
          <button class="btn btn-danger editor-btn btn-wide w-100" onclick="confirmClearAllData()">Clear All Data</button>
        </div>
      </div>
      <div id="refreshAppRow" class="mt-2 row align-items-center col-md-8 d-none">
        <div class="col-4 text-end"></div>
        <div class="col-8">
          <button class="btn btn-warning editor-btn btn-wide w-100" onclick="location.reload()">Refresh App</button>
        </div>
      </div>
      <div id="uploadStandardImagesRow" class="mt-2 row align-items-center col-md-8 d-none">
        <div class="col-4 text-end"></div>
        <div class="col-8">
          <button class="btn btn-primary editor-btn btn-wide w-100" onclick="uploadStandardImages()">Upload Standard Images</button>
        </div>
      </div>
      <div class="mt-2 row mb-4 align-items-center col-md-8">
        <div class="col-4 text-end"><label class="form-label mb-0">Share app</label></div>
        <div class="col-8">
          <div id="shareQrCode" style="background:white;padding:10px;display:inline-block;border-radius:8px;"></div>
        </div>
      </div>
      <div class="mt-5 small build-number">Build <span id="buildNumber"></span></div>
    </div>
    <script>document.getElementById("buildNumber").textContent = BUILD_NUMBER;</script>
    <!-- hidden sample data for icons, loaded on first visit -->
    <script id="sampleDataScript" type="application/json"></script>

  </div>

  <div id="deleteConfirmModal" class="modal fade" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body text-center pb-0">
          <p class="mb-3 fs-5" id="deleteConfirmMessage">Delete this item?</p>
        </div>
        <div class="modal-footer justify-content-center border-0 pt-2">
          <button class="btn btn-secondary editor-btn btn-wide" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-danger editor-btn btn-wide" id="deleteConfirmBtn">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BOOTSTRAP JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- FLATPICKR -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>

  <!-- QR CODE -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <script>
  document.write('<script src="js/settings.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/app.js?v=' + BUILD_NUMBER + '"><\/script>');
  document.write('<script src="js/images.js?v=' + BUILD_NUMBER + '"><\/script>');
  </script>

  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
  </script>

</body>
</html>
